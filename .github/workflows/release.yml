name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }} / ${{ matrix.dotnet }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.0.x', '9.0.x', '10.0.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Build, test, pack
        run: |
          dotnet build dotnet-archive.sln -c Release
          dotnet test tests/DotNetArchive.Tests/DotNetArchive.Tests.csproj -c Release --no-build
          dotnet pack src/DotNetArchive.Cli/dotnet-archive.csproj -c Release -o ./artifacts --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.os }}-${{ matrix.dotnet }}
          path: ./artifacts/*.nupkg

  publish:
    name: publish-nuget
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Publish to NuGet
        run: |
          for pkg in artifacts/pkg-*/*.nupkg; do
            if [[ "$pkg" != *".snupkg"* ]]; then
              dotnet nuget push "$pkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done

  github-release:
    name: github-release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.nupkg
            artifacts/**/*.snupkg
          generate_release_notes: true
