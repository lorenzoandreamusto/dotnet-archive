name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build:
    name: build-${{ matrix.os }} / ${{ matrix.dotnet }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.0.x', '9.0.x', '10.0.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore dotnet-archive.sln

      - name: Build
        run: dotnet build dotnet-archive.sln -c Release --no-restore /warnaserror

      - name: Test
        run: dotnet test tests/DotNetArchive.Tests/DotNetArchive.Tests.csproj -c Release --no-build --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.dotnet == '10.0.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.dotnet }}
          path: ./coverage

  integration:
    name: integration-${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install tool
        run: |
          dotnet pack src/DotNetArchive.Cli/dotnet-archive.csproj -c Release -o ./artifacts --no-build
          dotnet tool install -g dotnet-archive --add-source ./artifacts --version 1.1.0
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run smoke tests
        shell: bash
        run: |
          set -e
          dotnet archive version
          cd samples/HelloWorld
          dotnet archive export -o /tmp/HelloWorld.dna
          dotnet archive info /tmp/HelloWorld.dna
          dotnet archive verify /tmp/HelloWorld.dna
          dotnet archive run /tmp/HelloWorld.dna -- --smoke
          cd ../..
          echo "Smoke tests passed."
